name: Deploy Terraform to Azure

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destruir infraestrutura?"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: Validar Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_resource_group_name: ${{ secrets.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ secrets.LOCATION }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        working-directory: infra
        run: |
          terraform init
          terraform fmt -check
          terraform validate
          terraform plan -out=tfplan -input=false

  deploy:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: Deploy e Configuração
    needs: validate
    runs-on: ubuntu-latest
    env:
      TF_VAR_resource_group_name: ${{ secrets.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ secrets.LOCATION }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}

    outputs:
      vmName: ${{ steps.outputs.outputs.vm_name }}
      adminUsername: ${{ steps.outputs.outputs.admin_username }}
      publicIP: ${{ steps.outputs.outputs.public_ip }}
      nsgName: ${{ steps.outputs.outputs.nsg_name }}
      resourceGroup: ${{ steps.outputs.outputs.resource_group }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capturar Outputs
        id: outputs
        working-directory: infra
        run: |
          echo "vm_name=$(terraform output -raw vm_name)" >> $GITHUB_OUTPUT
          echo "admin_username=$(terraform output -raw admin_username)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT
          echo "nsg_name=$(terraform output -raw nsg_name)" >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

      - name: Instalar Ansible e sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Criar inventário
        run: |
          cat > inventory << EOF
          [vm]
          ${{ steps.outputs.outputs.public_ip }} ansible_user=${{ steps.outputs.outputs.admin_username }} ansible_password=${{ secrets.ADMIN_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Executar Playbook
        run: |
          ansible-playbook \
            -i inventory \
            ansible/playbook.yml \
            --extra-vars "ansible_sudo_pass=${{ secrets.ADMIN_PASSWORD }}"

  post-tests:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: Pós-Testes
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PUBLIC_IP: ${{ needs.deploy.outputs.publicIP }}
      VM_NAME: ${{ needs.deploy.outputs.vmName }}
      NSG_NAME: ${{ needs.deploy.outputs.nsgName }}
      RESOURCE_GROUP: ${{ needs.deploy.outputs.resourceGroup }}

    steps:
      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Aguardar aplicação subir
        run: sleep 60

      - name: Testar Swagger
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://$PUBLIC_IP:8081/swagger-ui/index.html)

          echo "Status HTTP: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Swagger indisponível"
            exit 1
          fi

      - name: Validar VM
        run: |
          az vm show \
            --name "$VM_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --output table

      - name: Validar NSG
        run: |
          az network nsg rule list \
            --nsg-name "$NSG_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --output table

  destroy:
    if: ${{ github.event.inputs.destroy == 'true' }}
    name: Destroy
    runs-on: ubuntu-latest
    env:
      TF_VAR_resource_group_name: ${{ secrets.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ secrets.LOCATION }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        working-directory: infra
        run: |
          terraform init
          terraform destroy -auto-approve